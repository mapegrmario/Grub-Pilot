<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Backend-Dienst läuft als root und darf den Namen besitzen -->
  <policy user="root">
    <allow own="org.grubpilot.backend"/>
    <allow send_destination="org.grubpilot.backend"/>
    <allow receive_sender="org.grubpilot.backend"/>
  </policy>

  <!-- Alle Benutzer dürfen Anfragen senden (PolKit prüft die Berechtigung) -->
  <policy context="default">
    <allow send_destination="org.grubpilot.backend"/>
    <allow receive_sender="org.grubpilot.backend"/>
    <allow send_destination="org.freedesktop.DBus"/>
    <allow receive_sender="org.freedesktop.DBus"/>
  </policy>

</busconfig>
